name: Test

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
      - name: Install package and test dependencies
        run: uv sync --locked --no-default-groups --group test --python ${{ matrix.python-version }}
      - name: Run pytest
        run: |
          uv run python - <<'PY'
          import subprocess
          import sys

          args = [sys.executable, "-m", "pytest", "-q"]
          try:
              import pyparsing.warnings  # noqa: F401
          except Exception:
              pass
          else:
              args += ["-W", "ignore::pyparsing.warnings.PyparsingDeprecationWarning"]
          try:
              import pytest

              getattr(pytest, "PytestRemovedIn10Warning")
          except Exception:
              pass
          else:
              args += ["-W", "ignore::pytest.PytestRemovedIn10Warning"]
          raise SystemExit(subprocess.call(args))
          PY
      - name: Run behave
        run: uv run behave -q

  libreoffice:
    name: LibreOffice contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install LibreOffice Impress
        run: |
          sudo apt-get update
          sudo apt-get install --yes libreoffice-impress
          command -v soffice
          soffice --version
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
      - name: Install package and test dependencies
        run: uv sync --locked --no-default-groups --group test --python "3.13"
      - name: Run independent-loader contract
        run: uv run python -m pytest -q -m lo_smoke tests/paper

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
      - name: Install documentation dependencies
        run: uv sync --locked --no-default-groups --group docs --python "3.13"
      - name: Build documentation without warnings
        run: uv run sphinx-build -W -b html docs docs/.build/html

  build:
    name: Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Build and inspect artifacts
        run: |
          python -m pip install build==1.2.2.post1 twine==6.1.0
          python -m build
          python -m twine check --strict dist/*
      - name: Verify distribution ownership in real environments
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/paper_pptx-*.whl)
          test "${#wheels[@]}" -eq 1
          wheel="$(pwd)/${wheels[0]}"
          matrix_root="$RUNNER_TEMP/paper-pptx-install-matrix"
          rm -rf "$matrix_root"

          expect_failure() {
            if "$@"; then
              echo "expected command to refuse: $*" >&2
              exit 1
            fi
          }

          python -m venv "$matrix_root/paper-only"
          "$matrix_root/paper-only/bin/python" -m pip install "$wheel"
          "$matrix_root/paper-only/bin/paper-pptx-doctor"

          python -m venv "$matrix_root/paper-then-upstream"
          "$matrix_root/paper-then-upstream/bin/python" -m pip install "$wheel"
          "$matrix_root/paper-then-upstream/bin/python" -m pip install \
            --no-deps python-pptx==1.0.2
          expect_failure "$matrix_root/paper-then-upstream/bin/paper-pptx-doctor"

          python -m venv "$matrix_root/upstream-then-paper"
          "$matrix_root/upstream-then-paper/bin/python" -m pip install \
            python-pptx==1.0.2
          "$matrix_root/upstream-then-paper/bin/python" -m pip install \
            --no-deps "$wheel"
          expect_failure "$matrix_root/upstream-then-paper/bin/paper-pptx-doctor"
          expect_failure "$matrix_root/upstream-then-paper/bin/python" \
            -c "import pptx"

          python -m venv "$matrix_root/unsafe-uninstall"
          "$matrix_root/unsafe-uninstall/bin/python" -m pip install "$wheel"
          "$matrix_root/unsafe-uninstall/bin/python" -m pip install \
            --no-deps python-pptx==1.0.2
          "$matrix_root/unsafe-uninstall/bin/python" -m pip uninstall \
            --yes python-pptx
          expect_failure "$matrix_root/unsafe-uninstall/bin/paper-pptx-doctor"

  required:
    name: Required
    if: always()
    needs: [test, libreoffice, docs, build]
    runs-on: ubuntu-latest
    steps:
      - name: Require every quality job
        env:
          TEST_RESULT: ${{ needs.test.result }}
          LIBREOFFICE_RESULT: ${{ needs.libreoffice.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          test "$TEST_RESULT" = success
          test "$LIBREOFFICE_RESULT" = success
          test "$DOCS_RESULT" = success
          test "$BUILD_RESULT" = success
