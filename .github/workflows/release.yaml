name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/test.yml

  build:
    name: Build release artifacts
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.11.28"
      - name: Install Python 3.13
        run: uv python install 3.13
      - name: Verify release source
        shell: bash
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+((a|b|rc)[0-9]+)?$ ]]
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - name: Build
        run: uv build
      - name: Check distribution metadata
        run: uvx --from twine==6.1.0 twine check --strict dist/*
      - name: Verify wheel identity
        shell: bash
        run: |
          package_version="$(uv run --isolated --no-project --with dist/*.whl python - <<'PY'
          import importlib.metadata
          import pptx

          distribution_version = importlib.metadata.version("paper-pptx")
          assert pptx.__paper_version__ == distribution_version
          print(distribution_version)
          PY
          )"
          test "${GITHUB_REF_NAME}" = "v${package_version}"
      - name: Smoke test source distribution
        run: |
          uv run --isolated --no-project --with dist/*.tar.gz python - <<'PY'
          import importlib.metadata
          import pptx

          assert pptx.__paper_version__ == importlib.metadata.version("paper-pptx")
          PY
      - name: Upload verified artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download verified artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-distributions
          path: dist
      - name: Publish exact verified artifacts
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Create GitHub release
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-distributions
          path: dist
      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes
